name: Morning Briefing

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  morning:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install openclaw
        run: npm install -g openclaw

      - name: Install deps
        run: |
          npm install nodemailer node-fetch dotenv

      # 创建 agent 并配置 openrouter
      - name: Setup OpenClaw agent
        run: |
          openclaw agents add main \
            --model openrouter/arcee-ai/trinity-large-preview:free \
            --workspace ~/.openclaw/agents/main/agent \
            --non-interactive

          mkdir -p ~/.openclaw/agents/main/agent

          cat > ~/.openclaw/agents/main/agent/auth.json <<EOF
          {
            "openrouter": {
              "type": "api_key",
              "key": "${OPENROUTER_API_KEY}",
              "baseURL": "https://openrouter.ai/api/v1"
            }
          }
          EOF
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      # 从 Secrets 生成 .env
      - name: Create .env
        run: |
          echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> .env
          echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env
          echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> .env
          echo "SMTP_PASS=${{ secrets.SMTP_PASS }}" >> .env
          echo "EMAIL_TO=${{ secrets.EMAIL_TO }}" >> .env
          echo "DISCORD_WEBHOOK=${{ secrets.DISCORD_WEBHOOK }}" >> .env

      # 运行 OpenClaw
      - name: Run OpenClaw
        run: |
          MESSAGE="$(cat task.txt)"
          openclaw agent --agent main -m "$MESSAGE" > output.md

      - name: Show npm debug log
        if: failure()
        run: |
          echo "===== npm debug log ====="
          ls -R /home/runner/.npm/_logs || true
          cat /home/runner/.npm/_logs/*debug-0.log || true

      - name: Send
        run: |
          export $(cat .env | xargs)
          node send.js